<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign up — blackbook</title>
    <link rel="stylesheet" href="/static/css/landing.css">
    <link rel="stylesheet" href="/static/css/auth.css">
</head>
<body class="landing-body dark-mode">
    <header class="landing-nav">
        <div class="landing-nav-inner">
            <a class="landing-brand" href="/">blackbook</a>
            <nav class="landing-nav-links">
                <a href="/">Home</a>
                <a href="{% url 'login' %}">Log in</a>
            </nav>
        </div>
    </header>
    <main class="auth-main">
        <div class="auth-card">
            <h1>Create account</h1>
            {% if messages %}
                {% for message in messages %}
                    <p class="auth-msg {% if message.tags %}auth-msg--{{ message.tags }}{% endif %}">{{ message }}</p>
                {% endfor %}
            {% endif %}
            <form method="post" class="auth-form">
                {% csrf_token %}
                <label>{{ form.username.label }}{{ form.username }}{% if form.username.errors %}<span class="field-error">{{ form.username.errors.0 }}</span>{% endif %}</label>
                <label>{{ form.password1.label }}{{ form.password1 }}{% if form.password1.errors %}<span class="field-error">{{ form.password1.errors.0 }}</span>{% endif %}</label>
                <label>{{ form.password2.label }}{{ form.password2 }}{% if form.password2.errors %}<span class="field-error">{{ form.password2.errors.0 }}</span>{% endif %}</label>
                <button type="submit" class="landing-btn landing-btn-primary auth-submit">Sign up</button>
            </form>
            <p class="auth-footer">Already have an account? <a href="{% url 'login' %}">Log in</a></p>
        </div>
    </main>
    <script src="/static/js/landing.js"></script>
</body>
</html>
