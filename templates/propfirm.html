<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackbook - PropFirm</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
</head>
<body class="dark-mode">
    <div class="app-shell">
        <main class="main-content container">
            <h1>propfirm mode</h1>
            <section class="panel">
                <h2>Mode</h2>
                <label><input type="radio" name="journalMode" value="normal" checked> Normal Mode</label>
                <label><input type="radio" name="journalMode" value="propfirm"> PropFirm Mode</label>
                <select id="activeProfileSelect"></select>
                <button id="saveModeBtn">Save Mode</button>
            </section>

            <section class="panel">
                <h2>Create Profile</h2>
                <form id="propfirmForm" class="trade-form">
                    <label>Name <input id="pfName" required></label>
                    <label>Max Drawdown % <input id="pfDrawdown" type="number" step="0.01" required></label>
                    <label>Max Daily Loss % <input id="pfDailyLoss" type="number" step="0.01" required></label>
                    <label>Risk Per Trade % <input id="pfRisk" type="number" step="0.01" required></label>
                    <label>Min Win Rate % <input id="pfWinRate" type="number" step="0.01" required></label>
                    <label>Max Trades/Day <input id="pfTradesPerDay" type="number" required></label>
                    <label>Consistency Rule % <input id="pfConsistencyRule" type="number" step="0.01" required></label>
                    <label>Max Trading Days <input id="pfMaxTradingDays" type="number" required></label>
                    <label>Profit Target % <input id="pfProfitTarget" type="number" step="0.01" required></label>
                    <label>Leverage Required <input id="pfLeverageRequired" type="number" step="0.01" required></label>
                    <label>Best Day Rule % <input id="pfBestDayRule" type="number" step="0.01" required></label>
                    <div class="modal-actions"><button type="submit">Create Profile</button></div>
                </form>
            </section>

            <section class="panel">
                <h2>Profiles</h2>
                <div id="propfirmList"></div>
            </section>

            <section class="panel">
                <h2>Consistency Feature</h2>
                <p>Separate checker: validates if one winning day dominates your total gains.</p>
                <button id="runConsistencyCheck" type="button">Run Consistency Check</button>
                <div id="consistencyResult" class="preview"></div>
            </section>
        </main>
        <aside id="sidebar" class="sidebar right">
            <button id="toggleSidebar" aria-label="Toggle navigation">☰</button>
            <a href="/dashboard/"><span>Dashboard</span></a>
            <a href="/calendar/"><span>Calendar</span></a>
            <a href="/analytics/"><span>Analytics</span></a>
            <a href="/assets/"><span>Assets</span></a>
            <a href="/strategies/"><span>Strategies</span></a>
            <a href="/propfirm/"><span>PropFirm Mode</span></a>
            <button id="modeSwitch" type="button" title="Toggle theme" aria-label="Toggle theme">◐</button>
            {% include "includes/sidebar_logout.html" %}
        </aside>
    </div>
    <script src="/static/js/common.js"></script>
    <script src="/static/js/propfirm.js"></script>
    <script src="/static/js/animations.js"></script>
</body>
</html>
