<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blackbook - Calendar</title>
    <link rel="stylesheet" href="/static/css/styles.css">
    <script src="https://cdn.jsdelivr.net/npm/dayjs@1/dayjs.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/animejs@3.2.1/lib/anime.min.js"></script>
</head>
<body class="dark-mode app-page page-calendar">
    <div class="app-shell">
    <main class="main-content container">
        <h1>blackbook calendar</h1>
        <section class="panel">
            <div class="calendar-head">
                <button id="prevMonth">Prev</button>
                <h2 id="monthLabel"></h2>
                <button id="nextMonth">Next</button>
            </div>
            <div class="section-head">
                <label>Asset
                    <select id="calendarAssetFilter"></select>
                </label>
                <button id="openTradeModal">+ Quick Add Trade</button>
            </div>
            <div class="weekdays">
                <div>Sun</div><div>Mon</div><div>Tue</div><div>Wed</div><div>Thu</div><div>Fri</div><div>Sat</div>
            </div>
            <div id="calendarGrid" class="calendar-grid"></div>
        </section>
    </main>
    <button id="toggleSidebar" class="mobile-nav-toggle" aria-label="Toggle navigation">☰</button>
    <aside id="sidebar" class="sidebar right">
        <a href="/dashboard/"><span>Dashboard</span></a>
            <a href="/calendar/"><span>Calendar</span></a>
        <a href="/analytics/"><span>Analytics</span></a>
        <a href="/assets/"><span>Assets</span></a>
        <a href="/strategies/"><span>Strategies</span></a>
        <a href="/propfirm/"><span>PropFirm Mode</span></a>
        <button id="modeSwitch" type="button" title="Toggle theme" aria-label="Toggle theme">◐</button>
        {% include "includes/sidebar_logout.html" %}
    </aside>
    </div>

    <div id="tradeModal" class="modal hidden">
        <div class="modal-content">
            <h3>Quick Trade Entry</h3>
            <form id="tradeForm" class="trade-form">
                <label>Asset <select name="asset" id="assetSelect" required></select></label>
                <label>Strategy <select name="strategy" id="strategySelect" required></select></label>
                <label>Date <input type="date" name="date" id="dateInput" required></label>
                <label>Entry <input type="number" step="0.0001" name="entry" id="entryInput" required></label>
                <label>Exit <input type="number" step="0.0001" name="exit" id="exitInput" required></label>
                <label>Stop Loss (optional) <input type="number" step="0.0001" name="stop_loss" id="stopLossInput"></label>
                <label>Take Profit (optional) <input type="number" step="0.0001" name="take_profit" id="takeProfitInput"></label>
                <label>Lot Size <input type="number" step="0.01" name="lot_size" id="lotSizeInput" required></label>
                <label>Direction
                    <select name="direction" id="directionInput" required>
                        <option value="BUY">BUY</option>
                        <option value="SELL">SELL</option>
                    </select>
                </label>
                <label>Notes <textarea name="notes" id="notesInput"></textarea></label>
                <label class="full-width">Tags <small>(comma-separated)</small>
                    <input type="text" name="tags" id="tagsInput" placeholder="FOMO, Discipline, Perfect Setup" autocomplete="off">
                </label>
                <label>Capital (risk base) <input type="number" step="1" name="capital" id="capitalInput" value="10000"></label>
                <div class="preview" id="tradePreview"></div>
                <div class="preview" id="simulationPreview"></div>
                <div class="modal-actions">
                    <button type="button" id="closeTradeModal">Cancel</button>
                    <button type="submit">Save Trade</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/static/js/common.js"></script>
    <script src="/static/js/trade.js"></script>
    <script src="/static/js/calendar.js"></script>
    <script src="/static/js/animations.js"></script>
</body>
</html>
